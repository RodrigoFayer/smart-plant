[platformio]
default_envs = nodemcuv2

; ── Device build ────────────────────────────────────────────────────────────
[env:nodemcuv2]
platform  = espressif8266
board     = nodemcuv2
framework = arduino
build_flags = -I src
lib_deps =
    knolleary/PubSubClient
    adafruit/DHT sensor library
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    arduino-libraries/NTPClient
    bblanchon/ArduinoJson

; ── OTA upload (wireless, after the first USB flash) ────────────────────────
[env:nodemcuv2_ota]
extends         = env:nodemcuv2
upload_protocol = espota
upload_port     = smart-plant.local
upload_flags    = --auth=${sysenv.OTA_PASSWORD}

; ── Host-native unit tests (pure-logic modules, no Arduino framework) ───────
[env:native]
platform               = native
test_framework         = unity
build_flags            = -I src -I test/mocks -std=c++17
test_build_src         = yes
build_src_filter       = +<*> -<main.cpp>
